name: CI

# Lint + hermetic test suite for slack-glue. Everything here is offline: the
# suite never touches a real Slack workspace, a live ShotGrid, a live LLM, or the
# network (replykit's ScriptedModel / MockModel stand in for any model). The only
# network access is dependency installation.

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so a busy PR doesn't queue stale jobs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out slack-glue
        uses: actions/checkout@v4

      # slack-glue depends on the sibling replykit engine, which is not published
      # to PyPI for this portfolio. Check it out alongside and install it editable
      # so CI builds against the exact engine source the tests exercise locally.
      # (For a published release, drop this step and let the pyproject pin resolve
      # replykit from PyPI.)
      - name: Check out replykit (sibling engine)
        uses: actions/checkout@v4
        with:
          repository: eggy-sh/replykit
          path: .replykit
          fetch-depth: 1
          # Don't fail the whole job if the repo isn't reachable; the install step
          # reports a clear message instead of a cryptic resolver error.
        continue-on-error: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Create venv and install slack-glue + replykit
        run: |
          uv venv --python ${{ matrix.python-version }}
          if [ -f .replykit/pyproject.toml ]; then
            echo "Installing replykit from the checked-out sibling repo."
            uv pip install -e .replykit
          else
            echo "::warning::replykit checkout unavailable; relying on the package index."
          fi
          uv pip install -e '.[dev]'

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pytest with coverage
        run: uv run pytest --cov=slack_glue --cov-report=term-missing

      - name: Smoke-run the examples (hermetic, no API key)
        run: |
          uv run python examples/ask_hermetic.py
          uv run python examples/slack_event.py

      - name: Smoke-run the CLI (hermetic, --json contract)
        run: |
          # ask: route + execute a scripted request, assert a single JSON object.
          uv run slack-glue ask "approved vfx shots reel 3 greenscreen" \
            --model scripted \
            -s $'@reply name=emit_query\nendpoint = /api/v1/shots\nstatus = approved\nreel = 3\ndept = vfx\ntags = greenscreen\n@end' \
            --json | uv run python -c "import sys, json; o = json.load(sys.stdin); assert o['ok'] and o['result']['count'] == 2, o"
          # serve --check: run a sample app_mention through the offline pipeline.
          uv run slack-glue serve --check --json \
            | uv run python -c "import sys, json; o = json.load(sys.stdin); assert o['check']['reply']['kind'] == 'results', o"
