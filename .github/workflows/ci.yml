name: CI

# Lint + hermetic test suite for slack-glue. Everything here is offline: the
# suite never touches a real Slack workspace, a live ShotGrid, a live LLM, or the
# network (replykit's ScriptedModel / MockModel stand in for any model). The only
# network access is dependency installation.

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so a busy PR doesn't queue stale jobs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out slack-glue
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # slack-glue depends on the sibling replykit engine, which is not yet
      # published to PyPI for this portfolio. CI installs it directly from its
      # git repo so the build resolves against the real engine source. Local /
      # dev installs the editable sibling checkout instead (see CONTRIBUTING.md);
      # both paths satisfy the `replykit>=0.1.0` pin in pyproject.toml.
      - name: Create venv and install replykit (from git) + slack-glue
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install "replykit @ git+https://github.com/eggy-sh/replykit@main"
          uv pip install -e '.[dev]'

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pytest with coverage
        run: uv run pytest --cov=slack_glue --cov-report=term-missing

      - name: Smoke-run the examples (hermetic, no API key)
        run: |
          uv run python examples/ask_hermetic.py
          uv run python examples/slack_event.py

      - name: Smoke-run the CLI (hermetic, --json contract)
        run: |
          # ask: route + execute a scripted request, assert a single JSON object.
          uv run slack-glue ask "approved vfx shots reel 3 greenscreen" \
            --model scripted \
            -s $'@reply name=emit_query\nendpoint = /api/v1/shots\nstatus = approved\nreel = 3\ndept = vfx\ntags = greenscreen\n@end' \
            --json | uv run python -c "import sys, json; o = json.load(sys.stdin); assert o['ok'] and o['result']['count'] == 2, o"
          # serve --check: run a sample app_mention through the offline pipeline.
          uv run slack-glue serve --check --json \
            | uv run python -c "import sys, json; o = json.load(sys.stdin); assert o['check']['reply']['kind'] == 'results', o"
